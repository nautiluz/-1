  function Icon({name,className,size}) {
    const C = I[name]; return C ? C({className,width:size||20,height:size||20}) : null;
  }

  function highlightPseudo(text){
    var kw=['ALGORITMO','FINALGORITMO','DEFINIR','REAL','ENTERO','CADENA','SI','SINO','SINOSI','ENTONCES','FINSI','MIENTRAS','FINMIENTRAS','REPETIR','HASTA','QUE','ESCRIBIR','LEER','ESPERAR','HACER','COMO','FIN'];
    function esc(s){return s.replace(/[&<>]/g,function(c){return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;'})}
    var html=esc(text);
    // strings
    html=html.replace(/("[^"]*")/g,'<span class="text-emerald-400">$1</span>');
    // numbers (standalone)
    html=html.replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="text-yellow-400">$1</span>');
    // multi-char operators
    html=html.replace(/(&lt;\-)/g,'<span class="text-orange-400">$1</span>');
    html=html.replace(/(&lt;=)/g,'<span class="text-orange-400">$1</span>');
    html=html.replace(/(&gt;=)/g,'<span class="text-orange-400">$1</span>');
    html=html.replace(/(==)/g,'<span class="text-orange-400">$1</span>');
    html=html.replace(/(!=)/g,'<span class="text-orange-400">$1</span>');
    // single-char operators (match HTML entities as whole, not char by char)
    html=html.replace(/(&gt;|&lt;|[+\-*\/])(?![^<]*>)/g,'<span class="text-orange-400">$1</span>');
    // keywords (must be whole words, after operators to avoid interference)
    html=html.replace(/\b(ALGORITMO|FINALGORITMO|DEFINIR|REAL|ENTERO|CADENA|SI|SINO|SINOSI|ENTONCES|FINSI|MIENTRAS|FINMIENTRAS|REPETIR|HASTA|QUE|ESCRIBIR|LEER|ESPERAR|HACER|COMO|FIN)\b/g,'<span class="text-purple-400 font-bold">$1</span>');
    return html;
  }

  // ===== CANVAS RENDERER =====
  const NODE_W=200, NODE_H=80;
  const COLORS = {
    bg:'#0f172a', grid:'#1e293b', nodeBg:'#1e293b', nodeBorder:'#475569',
    condition:'#a78bfa', result:'#10b981', process:'#3b82f6', io:'#f59e0b',
    start:'#10b981', end:'#ef4444', truePath:'#10b981', falsePath:'#ef4444',
    edge:'#64748b', edgeLabel:'#94a3b8', highlight:'#fbbf24',
    correct:'rgba(16,185,129,0.25)', wrong:'rgba(239,68,68,0.25)',
    selectedBg:'#334155', nodeText:'#e2e8f0', btnHover:'#475569'
  };

  function drawArrow(ctx, x1, y1, x2, y2, color, label) {
    const dx=x2-x1, dy=y2-y1;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len<1)return;
    const nx=dx/len, ny=dy/len;
    // Line
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle=color||COLORS.edge; ctx.lineWidth=2.5; ctx.stroke();
    // Arrowhead
    const aSize=10;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-nx*aSize-ny*aSize*0.4, y2-ny*aSize+nx*aSize*0.4);
    ctx.lineTo(x2-nx*aSize+ny*aSize*0.4, y2-ny*aSize-nx*aSize*0.4);
    ctx.closePath(); ctx.fillStyle=color||COLORS.edge; ctx.fill();
    // Label
    if(label){
      const mx=(x1+x2)/2+ny*16, my=(y1+y2)/2-nx*16;
      ctx.font='bold 14px monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const isV=label==='V';
      ctx.fillStyle=isV?COLORS.truePath:COLORS.falsePath;
      ctx.fillText(label, mx, my);
    }
  }

  function drawNode(ctx, n, highlighted, glowColor) {
    const {x,y,w,h} = n;
    const cx=x+w/2, cy=y+h/2;
    const isCond=n.type==='condition';
    const isResult=n.type==='result';
    const isStart=n.type==='start';
    const isEnd=n.type==='end';
    const isIO=n.type==='io';

    ctx.save();

    // Glow
    if(glowColor){
      ctx.shadowColor=glowColor; ctx.shadowBlur=25;
    }

    // Shape
    ctx.beginPath();
    if(isCond){
      ctx.moveTo(cx, y); ctx.lineTo(x+w, cy); ctx.lineTo(cx, y+h); ctx.lineTo(x, cy); ctx.closePath();
    } else if(isStart||isEnd){
      ctx.ellipse(cx, cy, w/2, h/2, 0, 0, Math.PI*2);
    } else if(isIO){
      ctx.moveTo(x+15, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w-15, y+h); ctx.lineTo(x, y+h); ctx.closePath();
    } else {
      const r=10;
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
    }

    // Fill
    let fill=COLORS.nodeBg;
    if(n.selected) fill=COLORS.selectedBg;
    else if(isCond) fill='#1e1b4b';
    else if(isResult) fill='#052e16';
    else if(isStart) fill='#052e16';
    else if(isEnd) fill='#450a0a';
    else if(isIO) fill='#1e3a5f';
    else fill='#1e293b';

    ctx.fillStyle=fill; ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=glowColor||(isCond?COLORS.condition:isResult?COLORS.result:isIO?COLORS.io:isStart?COLORS.start:isEnd?COLORS.end:COLORS.nodeBorder);
    ctx.lineWidth=glowColor?3:2; ctx.stroke();

    // Icon indicator
    ctx.font='16px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillStyle='#64748b';
    if(isCond) ctx.fillText('◆', cx, y-22);
    else if(isResult) ctx.fillText('●', cx, y-22);
    else if(isStart) ctx.fillText('▶', cx, y-22);
    else if(isEnd) ctx.fillText('■', cx, y-22);
    else if(isIO) ctx.fillText('◈', cx, y-22);

    // Text
    const lines=Array.isArray(n.text)?n.text:[n.text];
    ctx.font='13px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const lineH=18;
    const startY=cy-(lines.length-1)*lineH/2;
    lines.forEach((line,i)=>{
      ctx.fillStyle=COLORS.nodeText;
      ctx.fillText(line, cx, startY+i*lineH);
    });

    // Correct/wrong overlay
    if(n.overlay){
      ctx.fillStyle=n.overlay==='correct'?COLORS.correct:COLORS.wrong;
      ctx.fill();
    }

    ctx.restore();
  }

  // ===== CANVAS TRUTH TREE =====
  function CanvasTruthTree({tree, onComplete}) {
    const ref=useRef(null);
    const [nodes,setNodes]=useState([]);
    const [edges,setEdges]=useState([]);
    const [selectedNode,setSelectedNode]=useState(null);
    const [pathResults,setPathResults]=useState({});
    const [dragNode,setDragNode]=useState(null);
    const [dragOff,setDragOff]=useState(null);
    const [message,setMessage]=useState(null);
    const [completed,setCompleted]=useState(false);
    const [canvasSize,setCanvasSize]=useState({w:900,h:500});
    const interactionRef=useRef(null);

    // Build layout
    useEffect(()=>{
      if(!tree)return;
      const canvas=ref.current;
      if(!canvas)return;
      const rect=canvas.parentElement.getBoundingClientRect();
      const initW=Math.max(rect.width-32,600);
      const initH=500;

      // Layout from tree data
      const nodeMap={};
      tree.nodes.forEach(n=>{ nodeMap[n.id]={...n, w:NODE_W, h:NODE_H}; });

      // Build parent/children
      const children={}, parent={};
      tree.edges.forEach(e=>{
        if(!children[e.from])children[e.from]=[];
        children[e.from].push(e);
        parent[e.to]=e.from;
      });

      // Find root
      const rootId=tree.nodes.find(n=>!parent[n.id])?.id||tree.nodes[0].id;

      // Calculate depth & position
      const depths={}, xOrder={};
      function traverse(id,d,order){
        depths[id]=d;
        const kids=children[id]||[];
        if(kids.length>0){
          traverse(kids[0].to,d+1,order);
          xOrder[id]=order.current++;
          if(kids.length>1) traverse(kids[1].to,d+1,order);
        } else {
          xOrder[id]=order.current++;
        }
      }
      const order={current:0};
      traverse(rootId,0,order);

      const maxDepth=Math.max(...Object.values(depths),0);
      const maxOrder=Math.max(...Object.values(xOrder),1);
      const padX=130, padY=70;
      const gapX=(initW-padX*2)/maxOrder;
      const gapY=(initH-padY*2)/(maxDepth+1);

      let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
      Object.keys(nodeMap).forEach(id=>{
        nodeMap[id].x=padX+xOrder[id]*gapX-NODE_W/2;
        nodeMap[id].y=padY+depths[id]*gapY-NODE_H/2;
        const n=nodeMap[id];
        if(n.x<minX)minX=n.x;
        if(n.y<minY)minY=n.y;
        if(n.x+n.w>maxX)maxX=n.x+n.w;
        if(n.y+n.h>maxY)maxY=n.y+n.h;
      });

      setNodes(Object.values(nodeMap));
      setEdges(tree.edges);
      setSelectedNode(null);
      setPathResults({});
      setMessage(null);
      setCompleted(false);
      setCanvasSize({w:Math.max(maxX+padX,initW),h:Math.max(maxY+padY,initH)});
    },[tree]);

    const getNodeById=(id)=>nodes.find(n=>n.id===id);

    const handleCanvasClick=useCallback((e)=>{
      if(!ref.current||completed)return;
      const rect=ref.current.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      const scaleX=ref.current.width/rect.width, scaleY=ref.current.height/rect.height;
      const cx=mx*scaleX, cy=my*scaleY;

      // Check if clicked on a node
      for(const n of nodes){
        if(cx>=n.x&&cx<=n.x+n.w&&cy>=n.y&&cy<=n.y+n.h){
          if(n.type==='condition'&&!pathResults[n.id]){
            setSelectedNode(n.id);
            interactionRef.current={x:n.x+n.w/2,y:n.y+n.h};
            return;
          }
        }
      }
      setSelectedNode(null);
    },[nodes,pathResults,completed]);

    const handlePathChoice=useCallback((choice)=>{
      if(!selectedNode||completed)return;
      const n=nodes.find(x=>x.id===selectedNode);
      if(!n)return;

      const correct=n.correctPath===choice;
      const newResults={...pathResults, [selectedNode]:{choice,correct}};
      setPathResults(newResults);
      setSelectedNode(null);

      if(correct){
        setMessage({type:'success',text:'¡Correcto! Elegiste el camino adecuado.'});
        // Check if all conditions answered
        const allCond=nodes.filter(x=>x.type==='condition');
        const allDone=allCond.every(c=>newResults[c.id]);
        if(allDone){
          setCompleted(true);
          setTimeout(()=>{ if(onComplete)onComplete(); },500);
        }
      } else {
        const expected=n.correctPath==='true'?'Verdadero (V)':'Falso (F)';
        setMessage({type:'error',text:`Incorrecto. El flujo correcto era: ${expected}. ¡Intenta de nuevo!`});
      }

      setTimeout(()=>setMessage(null),3000);
    },[selectedNode,nodes,pathResults,completed]);

    const handleMouseDown=useCallback((e)=>{
      if(!ref.current)return;
      const rect=ref.current.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(ref.current.width/rect.width);
      const my=(e.clientY-rect.top)*(ref.current.height/rect.height);
      for(const n of nodes){
        if(mx>=n.x&&mx<=n.x+n.w&&my>=n.y&&my<=n.y+n.h){
          setDragNode(n.id);
          setDragOff({x:mx-n.x,y:my-n.y});
          return;
        }
      }
    },[nodes]);

    const handleMouseMove=useCallback((e)=>{
      if(!dragNode||!ref.current)return;
      const rect=ref.current.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(ref.current.width/rect.width);
      const my=(e.clientY-rect.top)*(ref.current.height/rect.height);
      setNodes(prev=>prev.map(n=>n.id===dragNode?{...n,x:mx-dragOff.x,y:my-dragOff.y}:n));
    },[dragNode,dragOff]);

    const handleMouseUp=useCallback(()=>{
      setDragNode(null); setDragOff(null);
    },[]);

    // Draw
    useEffect(()=>{
      const canvas=ref.current;
      if(!canvas)return;
      const ctx=canvas.getContext('2d');
      const W=canvas.width, H=canvas.height;

      ctx.clearRect(0,0,W,H);
      // Grid
      ctx.strokeStyle='rgba(30,41,59,0.5)'; ctx.lineWidth=1;
      for(let x=0;x<W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
      for(let y=0;y<H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

      // Edges
      edges.forEach(e=>{
        const fn=nodes.find(n=>n.id===e.from);
        const tn=nodes.find(n=>n.id===e.to);
        if(!fn||!tn)return;
        const fx=fn.x+fn.w/2, fy=fn.y+fn.h;
        const tx=tn.x+tn.w/2, ty=tn.y;
        const isV=e.label==='V';
        const pr=pathResults[e.from];
        let color=COLORS.edge;
        if(pr){
          const isCorrectPath=isV&&pr.choice==='true'||!isV&&pr.choice==='false';
          if(pr.correct&&isCorrectPath) color=COLORS.truePath;
          else if(!pr.correct&&isCorrectPath) color=COLORS.falsePath;
        }
        drawArrow(ctx,fx,fy,tx,ty,color,e.label);
      });

      // Nodes
      nodes.forEach(n=>{
        const pr=pathResults[n.id];
        const glow=pr?pr.correct?COLORS.truePath:COLORS.falsePath:null;
        drawNode(ctx,n,selectedNode===n.id,glow);
      });

      // Interaction popup
      if(selectedNode&&interactionRef.current){
        const ix=interactionRef.current.x, iy=interactionRef.current.y+20;
        // Background
        ctx.fillStyle='rgba(15,23,42,0.95)'; ctx.strokeStyle=COLORS.condition; ctx.lineWidth=2;
        ctx.beginPath(); ctx.roundRect(ix-90,iy,180,50,8); ctx.fill(); ctx.stroke();
        // Buttons
        const btnW=70, btnH=34, gap=10;
        const bx=ix-btnW-gap/2, by=iy+8;
        // V button
        ctx.fillStyle='#065f46'; ctx.strokeStyle='#10b981'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(bx,by,btnW,btnH,6); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#10b981'; ctx.font='bold 16px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('V',bx+btnW/2,by+btnH/2);
        // F button
        ctx.fillStyle='#7f1d1d'; ctx.strokeStyle='#ef4444';
        ctx.beginPath(); ctx.roundRect(bx+btnW+gap,by,btnW,btnH,6); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#ef4444'; ctx.fillText('F',bx+btnW+gap+btnW/2,by+btnH/2);
      }
    },[nodes,edges,selectedNode,pathResults]);

    // Overlay click detection for V/F buttons
    useEffect(()=>{
      const canvas=ref.current;
      if(!canvas)return;
      const handler=(e)=>{
        if(!selectedNode||completed)return;
        const rect=canvas.getBoundingClientRect();
        const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
        const my=(e.clientY-rect.top)*(canvas.height/rect.height);

        if(interactionRef.current){
          const ix=interactionRef.current.x, iy=interactionRef.current.y+20;
          const btnW=70, btnH=34, gap=10;
          const bx=ix-btnW-gap/2, by=iy+8;

          if(mx>=bx&&mx<=bx+btnW&&my>=by&&my<=by+btnH){
            handlePathChoice('true'); return;
          }
          if(mx>=bx+btnW+gap&&mx<=bx+btnW*2+gap&&my>=by&&my<=by+btnH){
            handlePathChoice('false'); return;
          }
        }
      };
      canvas.addEventListener('click',handler);
      return ()=>canvas.removeEventListener('click',handler);
    },[selectedNode,completed,handlePathChoice]);

    return React.createElement('div',{className:'space-y-3'},
      React.createElement('div',{className:'flex items-center justify-between'},
        React.createElement('h4',{className:'text-lg font-bold text-purple-400 flex items-center'},
          React.createElement(Icon,{name:'Network',size:18,className:'mr-2'}),
          ' Árbol de Decisión Interactivo'
        ),
        React.createElement('div',{className:'flex items-center gap-3 text-xs text-slate-500'},
          React.createElement('span',{className:'flex items-center gap-1'},React.createElement(Icon,{name:'Move',size:14}),'Arrastra nodos'),
          React.createElement('span',{className:'flex items-center gap-1'},React.createElement(Icon,{name:'Hand',size:14}),'Click en ◆ para decidir V/F')
        )
      ),
      React.createElement('div',{style:{position:'relative',overflow:'auto',background:'#0f172a',borderRadius:'0.75rem',border:'1px solid rgba(71,85,105,0.5)'}},
        React.createElement('canvas',{
          ref,
          className:'border-0 cursor-pointer',
          width:canvasSize.w, height:canvasSize.h,
          onMouseDown:handleMouseDown,
          onMouseMove:handleMouseMove,
          onMouseUp:handleMouseUp,
          onMouseLeave:handleMouseUp,
          onClick:handleCanvasClick
        }),
        message?React.createElement('div',{
          className:`absolute top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl font-bold text-sm shadow-2xl animate-fade-in z-10 ${
            message.type==='success'?'bg-emerald-900/80 text-emerald-300 border border-emerald-600':
            'bg-red-900/80 text-red-300 border border-red-600'
          }`
        },message.text):null,
        completed?React.createElement('div',{
          className:'absolute bottom-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl font-bold text-sm shadow-2xl animate-fade-in bg-emerald-900/80 text-emerald-300 border border-emerald-600'
        },'¡Todos los caminos correctos! +100 XP'):null
      )
    );

  // ===== DRAG & DROP FLOWCHART PUZZLE =====
  function DragDropFlowchart({flow, onComplete}){
    const nodeTxt=useCallback((n)=>{
      if(Array.isArray(n.text))return n.text.join(' ');
      return n.text;
    },[]);
    const buildPuzzle=useCallback((flow)=>{
      if(!flow)return null;
      const nodeMap={}; flow.nodes.forEach(n=>{nodeMap[n.id]={...n}});
      const children={}, parent={};
      flow.edges.forEach(e=>{
        if(!children[e.from])children[e.from]=[];
        children[e.from].push(e);
        parent[e.to]=e.from;
      });
      const rootId=flow.nodes.find(n=>!parent[n.id])?.id||flow.nodes[0].id;
      // BFS traversal avoiding cycles
      const order=[], visited=new Set();
      function walk(id){
        if(visited.has(id))return;
        visited.add(id);
        const node=nodeMap[id]; if(!node)return;
        const kids=children[id]||[];
        const vEdge=kids.find(e=>e.label==='V');
        const fEdge=kids.find(e=>e.label==='F');
        if(vEdge&&fEdge){
          order.push({type:'branch',cond:node,v:nodeMap[vEdge.to],f:nodeMap[fEdge.to]});
          walk(vEdge.to); walk(fEdge.to);
        }else{
          order.push({type:'node',node:node});
          kids.forEach(k=>walk(k.to));
        }
      }
      walk(rootId);
      const slots=[];
      const pieceMap={};
      order.forEach(o=>{
        if(o.type==='node'){
          const id=o.node.id;
          if(!pieceMap[id]){pieceMap[id]=true;slots.push({id,text:nodeTxt(o.node),type:o.node.type,node:o.node});}
        }else{
          const cid=o.cond.id;
          if(!pieceMap[cid]){pieceMap[cid]=true;slots.push({id:cid,text:nodeTxt(o.cond),type:'condition',node:o.cond,v:o.v,f:o.f});}
          const vid=o.v.id;
          if(!pieceMap[vid]){pieceMap[vid]=true;slots.push({id:vid,text:nodeTxt(o.v),type:o.v.type,node:o.v,branchOf:cid,branchLabel:'V'});}
          const fid=o.f.id;
          if(!pieceMap[fid]){pieceMap[fid]=true;slots.push({id:fid,text:nodeTxt(o.f),type:o.f.type,node:o.f,branchOf:cid,branchLabel:'F'});}
        }
      });
      // Find any remaining unvisited nodes and add them (for merge/end nodes)
      flow.nodes.forEach(n=>{
        if(!pieceMap[n.id]){pieceMap[n.id]=true;slots.push({id:n.id,text:nodeTxt(n),type:n.type,node:n});}
      });
      const pieces=flow.nodes.map(n=>({id:n.id,text:nodeTxt(n),type:n.type})).sort(()=>Math.random()-0.5);
      return {slots,pieces};
    },[nodeTxt]);

    const [puzzle,setPuzzle]=useState(null);
    const [placed,setPlaced]=useState({});
    const [selected,setSelected]=useState(null);
    const [errorSlot,setErrorSlot]=useState(null);
    const [won,setWon]=useState(false);
    const [shuffled,setShuffled]=useState([]);

    useEffect(()=>{
      if(!flow)return;
      const p=buildPuzzle(flow);
      if(!p)return;
      setPuzzle(p);
      setShuffled(p.pieces.map(pp=>({...pp,key:Math.random()})));
      setPlaced({});
      setSelected(null);
      setWon(false);
    },[flow,buildPuzzle]);

    const selectPiece=(id)=>{
      if(won)return;
      if(selected===id)setSelected(null);
      else setSelected(id);
    };

    const placePiece=(slotId)=>{
      if(won||!selected||!puzzle)return;
      const slot=puzzle.slots.find(s=>s.id===slotId);
      if(!slot||placed[slotId])return;
      if(selected===slotId){
        setPlaced(p=>{const n={...n,[slotId]:selected};if(Object.keys(n).length===puzzle.slots.length){setTimeout(()=>setWon(true),300);}return n;});
        setSelected(null);
      }else{
        setErrorSlot(slotId);
        setTimeout(()=>setErrorSlot(null),500);
      }
    };

    const shapeClass=(type,branch)=>{
      let base='flex items-center justify-center border-2 font-bold text-xs text-center transition-all ';
      if(type==='start'||type==='end')base+='rounded-full w-32 h-10 ';
      else if(type==='io')base+='skew-x-[-12deg] w-48 h-14 ';
      else if(type==='condition')base+='w-56 h-20 ';
      else base+='rounded-md w-44 h-14 ';
      return base;
    };

    const placedClass=(slotId)=>{
      if(errorSlot===slotId)return 'error-shake border-red-500 bg-red-900/30';
      if(placed[slotId])return 'border-emerald-500 bg-emerald-900/30 text-emerald-300 shadow-lg';
      return 'border-dashed border-slate-600 bg-slate-800/50 text-slate-500 hover:bg-slate-700/50';
    };

    const renderSlot=(slot,idx)=>{
      const isPlaced=!!placed[slot.id];
      const isBranch=slot.branchOf;
      const condBranch=slot.branchLabel;
      const inner=isPlaced
        ?React.createElement('span',{className:'text-white font-bold text-xs'},slot.text)
        :React.createElement('span',{className:'text-slate-500 text-xs'},'?');
      const el=React.createElement('button',{
        key:slot.id,
        onClick:()=>placePiece(slot.id),
        disabled:isPlaced||won,
        className:shapeClass(slot.type,slot.branchOf)+placedClass(slot.id)+(isPlaced?' cursor-default':' cursor-pointer')
      },inner);

      if(isBranch){
        // Branch label arrow
        const label=slot.branchLabel==='V'?'Sí':'No';
        const labelColor=slot.branchLabel==='V'?'text-emerald-400':'text-red-400';
        return React.createElement('div',{key:slot.id,className:'flex flex-col items-center'},
          React.createElement('div',{className:'w-1 h-6 bg-slate-600'+(slot.branchLabel==='V'?' ml-8':' mr-8')}),
          React.createElement('span',{className:labelColor+' text-xs font-bold mb-1'},label),
          el
        );
      }
      return el;
    };

    const renderSlotRow=(slot,idx)=>{
      // Check if next slots are branches of this one
      const nextSlots=puzzle?puzzle.slots:[];

      // Find if this is a condition with branches
      if(slot.type==='condition'){
        const vSlot=nextSlots.find(s=>s.branchOf===slot.id&&s.branchLabel==='V');
        const fSlot=nextSlots.find(s=>s.branchOf===slot.id&&s.branchLabel==='F');
        if(vSlot||fSlot){
          return React.createElement('div',{key:slot.id,className:'flex flex-col items-center w-full'},
            // Condition node
            renderSlot(slot,idx),
            // Branch arrows
            React.createElement('div',{className:'flex w-full justify-center gap-4 mt-1'},
              React.createElement('div',{className:'flex-1 flex flex-col items-center'},React.createElement('div',{className:'w-full h-px bg-slate-600'}),
                vSlot?renderSlot(vSlot):null),
              React.createElement('div',{className:'flex-1 flex flex-col items-center'},React.createElement('div',{className:'w-full h-px bg-slate-600'}),
                fSlot?renderSlot(fSlot):null)
            )
          );
        }
      }
      // Skip branch slots (already rendered with their condition)
      if(slot.branchOf)return null;
      return React.createElement('div',{key:slot.id,className:'flex flex-col items-center'},renderSlot(slot,idx));
    };

    if(!puzzle)return React.createElement('div',{className:'text-slate-400 text-center py-8'},'Generando puzzle...');

    return React.createElement('div',{className:'space-y-6 animate-fade-in'},
      React.createElement('div',{className:'flex items-center justify-between'},
        React.createElement('h4',{className:'text-lg font-bold text-indigo-400 flex items-center'},
          React.createElement(Icon,{name:'GitMerge',size:18,className:'mr-2'}),' Arma el Diagrama de Flujo'
        ),
        React.createElement('div',{className:'text-xs text-slate-500'},
          'Colocadas: ',Object.keys(placed).length,' / ',puzzle.slots.length
        )
      ),
      // Flowchart canvas
      React.createElement('div',{className:'bg-slate-900/80 border border-slate-700 rounded-xl p-6 flex flex-col items-center gap-3 min-h-[300px]'},
        puzzle.slots.map((s,i)=>renderSlotRow(s,i))
      ),
      // Pieces bank
      React.createElement('div',{className:'bg-slate-800/60 border border-slate-700 rounded-xl p-4'},
        React.createElement('h5',{className:'text-sm font-bold text-slate-400 mb-3 text-center'},'🧩 Banco de Piezas (toca una y luego toca el espacio vacío)'),
        React.createElement('div',{className:'flex flex-wrap justify-center gap-3'},
          shuffled.map(p=>{
            const used=!!placed[p.id];
            const isSel=selected===p.id;
            return React.createElement('button',{
              key:p.key,
              onClick:()=>selectPiece(p.id),
              disabled:used||won,
              className:shapeClass(p.type)+(used?' opacity-20 pointer-events-none':'')+(isSel?' ring-2 ring-indigo-400 scale-105 bg-slate-700 border-indigo-400':' border-slate-600 bg-slate-800 hover:bg-slate-700')+' text-white'
            },p.text);
          })
        )
      ),
      // Win message
      won?React.createElement('div',{className:'text-center py-4 px-6 bg-emerald-900/50 border border-emerald-600 rounded-xl'},
        React.createElement('p',{className:'text-emerald-300 font-bold text-lg'},'🎉 ¡Diagrama armado correctamente! +100 XP'),
        React.createElement('button',{onClick:()=>{if(onComplete)onComplete();},className:'mt-2 bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold text-sm transition'},
          'Continuar'
        )
      ):null
    );
  }

  // ===== CANVAS FLOWCHART =====
  function CanvasFlowchart({flow,onComplete}) {
    const ref=useRef(null);
    const [nodes,setNodes]=useState([]);
    const [edges,setEdges]=useState([]);
    const [step,setStep]=useState(-1);
    const [highlightedNodes,setHighlightedNodes]=useState([]);
    const [waitingDecision,setWaitingDecision]=useState(null);
    const [msg,setMsg]=useState(null);
    const [finished,setFinished]=useState(false);
    const [stepping,setStepping]=useState(false);
    const [dragNode,setDragNode]=useState(null);
    const [dragOff,setDragOff]=useState(null);
    const [canvasSize,setCanvasSize]=useState({w:900,h:550});

    // Build layout
    useEffect(()=>{
      if(!flow)return;
      const canvas=ref.current;
      if(!canvas)return;
      const rect=canvas.parentElement.getBoundingClientRect();
      const initW=Math.max(rect.width-32,700);
      const initH=550;

      const nodeMap={};
      flow.nodes.forEach(n=>{ nodeMap[n.id]={...n,w:NODE_W,h:NODE_H}; });

      const children={}, parent={};
      flow.edges.forEach(e=>{
        if(!children[e.from])children[e.from]=[];
        children[e.from].push(e);
        parent[e.to]=e.from;
      });

      const rootId=flow.nodes.find(n=>!parent[n.id])?.id||flow.nodes[0].id;

      // Calculate depth (longest path from root)
      const depth={};
      function calcDepth(id,d){
        if(depth[id]!==undefined)return;
        depth[id]=d;
        (children[id]||[]).forEach(c=>calcDepth(c.to,d+1));
      }
      calcDepth(rootId,0);

      // Calculate horizontal position (in-order within depth)
      const byDepth={};
      Object.keys(depth).forEach(id=>{
        const d=depth[id];
        if(!byDepth[d])byDepth[d]=[];
        byDepth[d].push(id);
      });

      const xPos={};
      Object.keys(byDepth).forEach(d=>{
        const nodesAtDepth=byDepth[d];
        const spacing=initW/(nodesAtDepth.length+1);
        nodesAtDepth.forEach((id,i)=>{
          xPos[id]=spacing*(i+1);
        });
      });

      const maxDepth=Math.max(...Object.values(depth),0);
      const padY=60;

      let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
      Object.keys(nodeMap).forEach(id=>{
        nodeMap[id].x=xPos[id]-NODE_W/2;
        nodeMap[id].y=padY+depth[id]*((initH-padY*2)/(maxDepth+1))-NODE_H/2;
        const n=nodeMap[id];
        if(n.x<minX)minX=n.x;
        if(n.y<minY)minY=n.y;
        if(n.x+n.w>maxX)maxX=n.x+n.w;
        if(n.y+n.h>maxY)maxY=n.y+n.h;
      });

      setNodes(Object.values(nodeMap));
      setEdges(flow.edges);
      setStep(-1);
      setHighlightedNodes([]);
      setWaitingDecision(null);
      setFinished(false);
      setCanvasSize({w:Math.max(maxX+60,initW),h:Math.max(maxY+padY,initH)});
    },[flow]);

    const executeStep=useCallback((decision)=>{
      if(finished)return;
      if(waitingDecision){
        // User made a decision at a condition node
        const condId=waitingDecision.nodeId;
        const nextEdge=edges.find(e=>e.from===condId&&e.label===decision);
        if(!nextEdge){ setMsg({type:'error',text:'Ruta no encontrada'}); return; }

        const correctDecision=waitingDecision.correctPath;
        if(decision===correctDecision){
          setMsg({type:'success',text:'¡Decisión correcta! Sigues el flujo adecuado.'});
          setHighlightedNodes(prev=>[...prev,nextEdge.to]);
          setStep(prev=>prev+1);
          // Check if next node is condition
          const nextNode=nodes.find(n=>n.id===nextEdge.to);
          if(nextNode&&nextNode.type==='condition'){
            setWaitingDecision({nodeId:nextNode.id,correctPath:nextNode.correctPath});
          } else {
            const nextKids=edges.filter(e=>e.from===nextEdge.to);
            if(nextKids.length===0){
              setWaitingDecision(null);
              setFinished(true);
              setMsg({type:'success',text:'¡Algoritmo ejecutado correctamente! +100 XP'});
              setTimeout(()=>{ if(onComplete)onComplete(); },800);
            } else {
              // Check if next condition
              const nn=nodes.find(n=>n.id===nextKids[0].to);
              if(nn&&nn.type==='condition'){
                setWaitingDecision({nodeId:nn.id,correctPath:nn.correctPath});
              } else {
                setWaitingDecision(null);
                // Auto-advance through non-condition nodes
                setTimeout(()=>{
                  const nextId=nextKids[0].to;
                  setHighlightedNodes(prev=>[...prev,nextId]);
                  setStep(prev=>prev+1);
                  const nextN=nodes.find(n=>n.id===nextId);
                  if(nextN&&nextN.type==='condition'){
                    setWaitingDecision({nodeId:nextN.id,correctPath:nextN.correctPath});
                  } else {
                    const moreEdges=edges.filter(e=>e.from===nextId);
                    if(moreEdges.length>0){
                      const nextMore=nodes.find(n=>n.id===moreEdges[0].to);
                      if(nextMore&&nextMore.type==='condition'){
                        setWaitingDecision({nodeId:nextMore.id,correctPath:nextMore.correctPath});
                      }
                    }
                  }
                },500);
              }
            }
          }
        } else {
          const expected=correctDecision==='true'?'Verdadero (V)':'Falso (F)';
          setMsg({type:'error',text:`¡Incorrecto! La condición evaluó a ${expected}. ¡Reinicia y prueba otra ruta.`});
          setWaitingDecision(null);
        }
        setTimeout(()=>setMsg(null),3000);
        return;
      }

      // First step: highlight root
      if(step===-1){
        const rootId=nodes.length>0?nodes[0].id:null;
        if(rootId){
          setHighlightedNodes([rootId]);
          setStep(0);
          const rootNode=nodes.find(n=>n.id===rootId);
          if(rootNode&&rootNode.type==='condition'){
            setWaitingDecision({nodeId:rootId,correctPath:rootNode.correctPath});
          } else {
            // Auto-advance
            const nextEdges=edges.filter(e=>e.from===rootId);
            if(nextEdges.length>0){
              const nextId=nextEdges[0].to;
              setTimeout(()=>{
                setHighlightedNodes(prev=>[...prev,nextId]);
                setStep(1);
                const nextN=nodes.find(n=>n.id===nextId);
                if(nextN&&nextN.type==='condition'){
                  setWaitingDecision({nodeId:nextId,correctPath:nextN.correctPath});
                }
              },500);
            }
          }
        }
        return;
      }
    },[step,waitingDecision,nodes,edges,finished,onComplete]);

    const resetFlow=useCallback(()=>{
      setStep(-1); setHighlightedNodes([]); setWaitingDecision(null); setMsg(null); setFinished(false);
    },[]);

    // Draw
    useEffect(()=>{
      const canvas=ref.current;
      if(!canvas)return;
      const ctx=canvas.getContext('2d');
      const W=canvas.width, H=canvas.height;

      ctx.clearRect(0,0,W,H);
      // Grid
      ctx.strokeStyle='rgba(30,41,59,0.5)'; ctx.lineWidth=1;
      for(let x=0;x<W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
      for(let y=0;y<H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

      // Edges
      edges.forEach(e=>{
        const fn=nodes.find(n=>n.id===e.from);
        const tn=nodes.find(n=>n.id===e.to);
        if(!fn||!tn)return;
        const fx=fn.x+fn.w/2, fy=fn.y+fn.h;
        const tx=tn.x+tn.w/2, ty=tn.y;
        const hl=highlightedNodes.includes(e.from)&&highlightedNodes.includes(e.to);
        drawArrow(ctx,fx,fy,tx,ty,hl?COLORS.highlight:COLORS.edge,e.label);
      });

      // Nodes
      nodes.forEach(n=>{
        const hl=highlightedNodes.includes(n.id);
        drawNode(ctx,n,hl,hl?COLORS.highlight:null);
      });

      // Legend
      ctx.font='11px monospace'; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillStyle='rgba(100,116,139,0.7)';
      const legendY=H-50;
      const legends=[
        {x:20,color:COLORS.condition,text:'◆ Decisión'},
        {x:140,color:COLORS.result,text:'● Resultado'},
        {x:260,color:COLORS.process,text:'▣ Proceso'},
        {x:380,color:COLORS.io,text:'◈ Entrada/Salida'},
        {x:520,color:COLORS.highlight,text:'★ Paso actual'}
      ];
      legends.forEach(l=>{
        ctx.fillStyle=l.color; ctx.fillRect(l.x,legendY,10,10);
        ctx.fillStyle='rgba(100,116,139,0.7)'; ctx.fillText(l.text,l.x+16,legendY);
      });
    },[nodes,edges,highlightedNodes]);

    // Mouse drag handlers
    const hMD=useCallback((e)=>{
      if(!ref.current)return;
      const rect=ref.current.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(ref.current.width/rect.width);
      const my=(e.clientY-rect.top)*(ref.current.height/rect.height);
      for(const n of nodes){
        if(mx>=n.x&&mx<=n.x+n.w&&my>=n.y&&my<=n.y+n.h){
          setDragNode(n.id); setDragOff({x:mx-n.x,y:my-n.y}); return;
        }
      }
    },[nodes]);

    const hMM=useCallback((e)=>{
      if(!dragNode||!ref.current)return;
      const rect=ref.current.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(ref.current.width/rect.width);
      const my=(e.clientY-rect.top)*(ref.current.height/rect.height);
      setNodes(prev=>prev.map(n=>n.id===dragNode?{...n,x:mx-dragOff.x,y:my-dragOff.y}:n));
    },[dragNode,dragOff]);

    const hMU=useCallback(()=>{setDragNode(null);setDragOff(null);},[]);

    const isRunning=highlightedNodes.length>0&&!finished;

    return React.createElement('div',{className:'space-y-3'},
      React.createElement('div',{className:'flex items-center justify-between flex-wrap gap-2'},

          React.createElement('div',{className:'p-4 flex-grow overflow-y-auto',style:{minHeight:'450px',background:'radial-gradient(ellipse at top, #1e293b, #0f172a, #020617)'}},renderContent())
        )
      )
    );
  }

  // ===== MOUNT =====
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
